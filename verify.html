<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.card{
  background:#fff;border-radius:24px;padding:40px;max-width:420px;width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,.25);text-align:center;
}
.btn-main{
  background:#4f46e5;color:#fff;border:none;border-radius:999px;
  padding:14px;font-weight:600;
}
.timer{color:#6b7280;font-size:.9rem}
</style>
</head>
<body>

<div class="card">
  <h3 class="mb-2">Verify OTP</h3>
  <p class="text-muted mb-4">Enter the 6-digit code</p>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input type="number" name="otp" class="form-control mb-3"
           placeholder="••••••" required>
    <button class="btn btn-main w-100">Verify & Login →</button>
  </form>

  <div class="timer mt-3">
    Resend OTP in <span id="t">30</span>s
  </div>
</div>

<script>
let t=30, el=document.getElementById('t');
const iv=setInterval(()=>{
  t--; el.textContent=t;
  if(t<=0){clearInterval(iv); el.textContent="0";}
},1000);
</script>
</body>
</html>
