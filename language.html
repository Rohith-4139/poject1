<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Language - Disease Risk Dashboard</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="gradient-bg"></div>
<div class="particles" id="particles"></div>
<div class="medical-cross"><i class='bx bx-plus-medical'></i></div>

<div class="container">
  <div class="login-container" style="max-width: 600px;">
    <h1 class="welcome-text" style="margin-bottom: 10px;">
      Choose Interface Language
    </h1>
    <p class="text-muted mb-4" style="font-size: 0.95rem;">
      This language will be used in the Disease Susceptibility &amp; Risk Analysis dashboard.
    </p>

    <div class="form-group">
      <label class="form-label fw-semibold">Language</label>
      <select class="form-control" id="languageSelect">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="te">Telugu</option>
        <option value="ta">Tamil</option>
        <option value="bn">Bengali</option>
      </select>
    </div>

    <button class="btn-signin mt-3" onclick="confirmLanguage(event)">
      Continue
    </button>
  </div>
</div>

<script>
  function confirmLanguage(event) {
    if (event && event.preventDefault) {
      event.preventDefault();
    }

    const selectEl = document.getElementById('languageSelect');
    const lang = selectEl ? selectEl.value : 'en';

    fetch('/set_language', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ language: lang })
    })
    .then(function (response) {
      if (response.redirected) {
        window.location.href = response.url;
      } else if (response.ok) {
        window.location.href = '/upload';
      } else {
        console.error('Failed to set language');
      }
    })
    .catch(function (error) {
      console.error('Error setting language:', error);
    });
  }
</script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
